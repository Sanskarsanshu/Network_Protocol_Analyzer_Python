<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracely Analyzer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
                gray: { 800: '#1e293b', 900: '#0f172a' },
                accent: '#3b82f6'
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area, Legend } = window.Recharts;

        function App() {
            const [stats, setStats] = useState({ traffic: { history: [], breakdown: {}, total: 0 }, latency: { current: 0, history: [] }, alerts: [] });
            const [packets, setPackets] = useState([]);

            useEffect(() => {
                const interval = setInterval(() => {
                    fetch('/api/stats').then(res => res.json()).then(data => setStats(data));
                    fetch('/api/packets').then(res => res.json()).then(data => setPackets(data.packets));
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="p-6 max-w-7xl mx-auto space-y-6">
                    <div className="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-xl">
                        <div>
                            <h1 className="text-2xl font-bold text-white tracking-tight">Protocol Analyzer</h1>
                            <p className="text-gray-400 text-sm">Live Network Monitoring & Threat Detection</p>
                        </div>
                        <div className="flex items-center space-x-6 text-sm">
                            <div className="flex flex-col items-end">
                                <span className="text-gray-400">Total Packets</span>
                                <span className="font-mono text-xl text-blue-400 font-bold">{stats.traffic.total.toLocaleString()}</span>
                            </div>
                            <div className="flex flex-col items-end">
                                <span className="text-gray-400">Current Latency</span>
                                <span className={\ont-mono text-xl font-bold \\}>
                                    {stats.latency.current} ms
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Traffic Chart */}
                        <div className="lg:col-span-2 bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                            <h2 className="text-lg font-semibold mb-4 text-gray-200">Live Traffic Volume (Packets / sec)</h2>
                            <div className="h-64">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={stats.traffic.history}>
                                        <defs>
                                            <linearGradient id="colorPps" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                                        <XAxis dataKey="time" stroke="#94a3b8" fontSize={12} tickMargin={10} minTickGap={30} />
                                        <YAxis stroke="#94a3b8" fontSize={12} />
                                        <Tooltip contentStyle={{backgroundColor: '#1e293b', borderColor: '#334155', color: '#fff'}} />
                                        <Area type="monotone" dataKey="pps" stroke="#3b82f6" strokeWidth={3} fillOpacity={1} fill="url(#colorPps)" animationDuration={300} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Alerts Panel */}
                        <div className="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg flex flex-col">
                            <h2 className="text-lg font-semibold mb-4 text-gray-200 flex items-center">
                                <svg className="w-5 h-5 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                Latency Spike Alerts
                            </h2>
                            <div className="flex-1 overflow-y-auto space-y-3">
                                {stats.alerts.length === 0 ? (
                                    <div className="text-gray-500 text-sm text-center mt-10">No recent alerts. Network is stable.</div>
                                ) : stats.alerts.map((alert, i) => (
                                    <div key={i} className="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-lg flex justify-between animate-pulse">
                                        <span>{alert.msg}</span>
                                        <span className="text-red-500/70">{alert.time}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Latency Chart */}
                        <div className="lg:col-span-3 bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                            <h2 className="text-lg font-semibold mb-4 text-gray-200">Network Latency (RTT ms) to 8.8.8.8</h2>
                            <div className="h-64">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={stats.latency.history}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                                        <XAxis dataKey="time" stroke="#94a3b8" fontSize={12} minTickGap={30} />
                                        <YAxis stroke="#94a3b8" fontSize={12} domain={[0, 'dataMax + 20']} />
                                        <Tooltip contentStyle={{backgroundColor: '#1e293b', borderColor: '#334155', color: '#fff'}} />
                                        <Line type="stepAfter" dataKey="latency" stroke="#10b981" strokeWidth={2} dot={false} animationDuration={300} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Recent Packets Feed */}
                        <div className="lg:col-span-3 bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                            <h2 className="text-lg font-semibold mb-4 text-gray-200">Live Packet Feed</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left text-gray-400 whitespace-nowrap">
                                    <thead className="text-xs text-gray-500 uppercase bg-gray-900/50">
                                        <tr>
                                            <th className="px-4 py-3 rounded-tl-lg">Time</th>
                                            <th className="px-4 py-3">Protocol</th>
                                            <th className="px-4 py-3">Source IP</th>
                                            <th className="px-4 py-3">Dest IP</th>
                                            <th className="px-4 py-3 rounded-tr-lg">Summary</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {packets.map((p, i) => (
                                            <tr key={i} className="border-b border-gray-700/50 hover:bg-gray-700/30 transition-colors">
                                                <td className="px-4 py-3 font-mono text-xs">{p.time}</td>
                                                <td className="px-4 py-3">
                                                    <span className={\px-2 py-1 rounded text-xs font-semibold \\}>
                                                        {p.proto}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 font-mono text-xs">{p.src}</td>
                                                <td className="px-4 py-3 font-mono text-xs">{p.dst}</td>
                                                <td className="px-4 py-3 text-gray-300 truncate max-w-md">{p.summary}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
